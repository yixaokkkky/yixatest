<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>reaCall Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: rgba(255, 255, 255, 0.07);
      --accent: #6c63ff;
      --accent2: #ff6584;
      --green: #00e676;
      --red: #ff1744;
      --text: #f0f0ff;
      --muted: #6b6b88;
      --glass: rgba(18, 18, 26, 0.85);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .screen {
      position: absolute; inset: 0;
      display: none;
      flex-direction: column;
      pointer-events: none;
    }

    .screen.active { display: flex; pointer-events: all; }

    /* ── HOME SCREEN ── */
    #home-screen { padding: 24px 20px 32px; background: var(--bg); }
    .app-header { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .app-logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .app-title { font-size: 20px; font-weight: 700; }
    .my-number-badge { margin-left: auto; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 11px; color: var(--muted); }

    .number-display {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 14px 18px;
      font-size: 22px; font-weight: 300; letter-spacing: 3px; min-height: 56px; margin-bottom: 16px;
      display: flex; align-items: center; position: relative; overflow: hidden;
    }

    .dialpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .dial-key { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 8px; text-align: center; cursor: pointer; transition: all 0.15s; }
    .dial-key:active { background: var(--surface2); transform: scale(0.95); }

    .call-btn {
      width: 100%; padding: 16px; border-radius: 16px; border: none; cursor: pointer;
      background: linear-gradient(135deg, var(--accent), #9c59ff); color: #fff; font-weight: 600;
      box-shadow: 0 8px 32px rgba(108, 99, 255, 0.35); display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    /* ── CALL SCREEN ── */
    #call-screen { background: #000; overflow: hidden; width: 100%; height: 100vh; }
    #remote-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; background: #000; }

    .call-overlay {
      position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column;
      background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(1px); pointer-events: none;
    }
    .call-overlay > * { pointer-events: all; }

    .call-overlay::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 160px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); z-index: -1; }
    .call-overlay::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 240px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); z-index: -1; }

    .call-top { padding: 30px 20px 0; display: flex; flex-direction: column; align-items: center; }
    .call-name { font-size: 24px; font-weight: 700; text-shadow: 0 4px 12px rgba(0,0,0,0.5); }
    .call-timer { font-size: 14px; color: rgba(255,255,255,0.8); margin-top: 6px; background: rgba(0,0,0,0.3); padding: 2px 10px; border-radius: 12px; backdrop-filter: blur(4px); }

    #local-pip {
      position: absolute; top: 100px; right: 20px; width: 90px; height: 140px; border-radius: 16px;
      overflow: hidden; border: 1px solid rgba(255,255,255,0.2); z-index: 12; background: #111; box-shadow: 0 12px 32px rgba(0,0,0,0.8);
    }

    .call-bottom { margin-top: auto; padding: 0 24px 50px; display: flex; flex-direction: column; gap: 24px; }
    .call-controls { display: flex; justify-content: center; gap: 25px; }
    .ctrl-btn .circle {
      width: 56px; height: 56px; border-radius: 50%; background: rgba(255,255,255,0.1); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 24px; transition: all 0.25s;
    }
    .ctrl-btn.active .circle { background: #fff; color: #000; }
    .ctrl-btn:active .circle { transform: scale(0.85); }
    .ctrl-btn .label { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 8px; text-align: center; }

    .hangup-btn {
      width: 100%; padding: 18px; border-radius: 20px; border: none;
      background: linear-gradient(135deg, #ff1744, #d50000); color: #fff; font-size: 17px; font-weight: 700;
      box-shadow: 0 10px 30px rgba(255, 23, 68, 0.4); display: flex; align-items: center; justify-content: center; gap: 12px;
    }

    .status-text { font-size: 10px; color: var(--muted); display: flex; align-items: center; gap: 5px; margin-top: 10px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }

    #local-video-pip { width: 100%; height: 100%; object-fit: cover; }
    .no-video-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); z-index: 0; }
  </style>
</head>
<body>

  <!-- ══════════════ HOME SCREEN ══════════════ -->
  <div id="home-screen" class="screen active">
    <div class="app-header">
      <div class="app-logo">📹</div>
      <div class="app-title">reaCall</div>
      <div class="my-number-badge">Mi número: <span id="my-number-label">---</span></div>
    </div>
    <div class="number-display">
      <div id="number-input-display"></div>
      <button style="position:absolute; right:15px; background:none; border:none; color:white; font-size:20px;" onclick="backspace()">⌫</button>
    </div>
    <div class="dialpad">
      <div class="dial-key" onclick="pressKey('1')">1</div>
      <div class="dial-key" onclick="pressKey('2')">2</div>
      <div class="dial-key" onclick="pressKey('3')">3</div>
      <div class="dial-key" onclick="pressKey('4')">4</div>
      <div class="dial-key" onclick="pressKey('5')">5</div>
      <div class="dial-key" onclick="pressKey('6')">6</div>
      <div class="dial-key" onclick="pressKey('7')">7</div>
      <div class="dial-key" onclick="pressKey('8')">8</div>
      <div class="dial-key" onclick="pressKey('9')">9</div>
      <div class="dial-key" onclick="pressKey('*')">*</div>
      <div class="dial-key" onclick="pressKey('0')">0</div>
      <div class="dial-key" onclick="pressKey('#')">#</div>
    </div>
    <button class="call-btn" onclick="startCall()">📹 Iniciar Videollamada</button>
    <div class="status-text"><span class="status-dot"></span> <span id="peer-status">Conectando...</span></div>
  </div>

  <!-- ══════════════ INCOMING SCREEN ══════════════ -->
  <div id="incoming-screen" class="screen" style="align-items:center; justify-content:center; background:linear-gradient(to bottom, #1a0d2e, #0a0a0f);">
    <div style="font-size:12px; text-transform:uppercase; letter-spacing:2px; margin-bottom:10px;">Llamada de</div>
    <div id="incoming-number-label" style="font-size:32px; font-weight:700; margin-bottom:40px;">---</div>
    <div style="display:flex; gap:40px;">
      <div onclick="declineCall()" style="background:#ff1744; width:64px; height:64px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px;">📵</div>
      <div onclick="acceptCall()" style="background:#00e676; width:64px; height:64px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px;">📹</div>
    </div>
  </div>

  <!-- ══════════════ CALL SCREEN ══════════════ -->
  <div id="call-screen" class="screen">
    <video id="remote-video" autoplay playsinline></video>
    <div class="no-video-placeholder" id="no-video-placeholder">📡 <p>Esperando video...</p></div>
    <div class="call-overlay">
      <div class="call-top">
        <div class="call-name" id="call-remote-name">---</div>
        <div class="call-timer" id="call-timer">00:00</div>
      </div>
      <div id="local-pip"><video id="local-video-pip" autoplay muted playsinline></video></div>
      <div class="call-bottom">
        <div class="call-controls">
          <div class="ctrl-btn" id="mute-btn" onclick="toggleMute()"><div class="circle">🎙️</div><div class="label">Silencio</div></div>
          <div class="ctrl-btn" onclick="flipCamera()"><div class="circle">🔄</div><div class="label">Voltear</div></div>
          <div class="ctrl-btn" id="speaker-btn" onclick="toggleSpeaker()"><div class="circle">🔊</div><div class="label">Altavoz</div></div>
        </div>
        <button class="hangup-btn" onclick="hangUp()">📵 Colgar</button>
      </div>
    </div>
  </div>

  <script>
    let peer = null, localStream = null, currentCall = null, myNumber = null, callTimerInterval = null, callSeconds = 0, isMuted = false, isSelfie = false, cameraMode = 'game', gameRender = null, incomingCallRef = null;

    function isFiveM() { return window.location.hostname === 'cfx-nui'; }
    function fetchNui(event, data) {
      const resName = (typeof globalThis !== 'undefined' && globalThis.resourceName) ? globalThis.resourceName : 'lb-realcall';
      return fetch(`https://${resName}/${event}`, { method: 'POST', body: JSON.stringify(data || {}) }).then(r => r.json()).catch(() => ({}));
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // ═══════════════════════════════════════════════
    // INIT - Corrección del error de duplicación
    // ═══════════════════════════════════════════════
    async function init() {
      let numberToUse = null;

      if (isFiveM()) {
        try {
          const res = await fetchNui('getMyNumber', {});
          if (res.number && res.number !== "") { numberToUse = res.number; }
        } catch (e) { console.warn("Error FiveM, usando aleatorio."); }
      }

      if (!numberToUse) {
        const urlParams = new URLSearchParams(window.location.search);
        let urlNum = urlParams.get('number');
        if (urlNum) {
          numberToUse = urlNum;
        } else {
          let stored = sessionStorage.getItem('my_random_id');
          if (stored) { numberToUse = stored; } 
          else {
            numberToUse = Math.floor(100000 + Math.random() * 900000).toString();
            sessionStorage.setItem('my_random_id', numberToUse);
          }
        }
      }

      myNumber = numberToUse;
      const label = document.getElementById('my-number-label');
      if (label) label.textContent = myNumber;
      
      const st = document.getElementById('peer-status');
      if (st) st.textContent = 'Listo · ' + myNumber;
      
      initPeer(myNumber);
    }

    window.addEventListener('message', (e) => {
      if (e.data.action === 'callStarted') showCallScreen(e.data.number, e.data.name || e.data.number);
      if (e.data.action === 'callEnded') cleanupCall();
    });

    function initPeer(number) {
      if (peer) { try { peer.destroy(); } catch(e){} }
      peer = new Peer('lbvc_' + number, { host: '0.peerjs.com', port: 443, secure: true });
      peer.on('open', () => document.getElementById('peer-status').textContent = 'Listo · ' + number);
      peer.on('call', (call) => {
        incomingCallRef = call;
        document.getElementById('incoming-number-label').textContent = call.peer.replace('lbvc_', '');
        showScreen('incoming-screen');
      });
      peer.on('error', (err) => {
        document.getElementById('peer-status').textContent = 'Error: ' + err.type;
        if (err.type === 'network' || err.type === 'server-error') setTimeout(() => initPeer(number), 3000);
      });
    }

    let inputNumber = '';
    function pressKey(k) { if (inputNumber.length < 15) inputNumber += k; document.getElementById('number-input-display').textContent = inputNumber; }
    function backspace() { inputNumber = inputNumber.slice(0, -1); document.getElementById('number-input-display').textContent = inputNumber; }

    async function startCall() {
      const target = inputNumber.trim();
      if (!target || !peer) return;
      showCallScreen(target, target);
      fetchNui('initiateCall', { targetNumber: target });
      await prepareLocalStream();
      currentCall = peer.call('lbvc_' + target, localStream || new MediaStream());
      setupRemoteStreamHandlers(currentCall);
    }

    async function acceptCall() {
      if (!incomingCallRef) return;
      const num = document.getElementById('incoming-number-label').textContent;
      showCallScreen(num, num);
      await prepareLocalStream();
      incomingCallRef.answer(localStream || new MediaStream());
      setupRemoteStreamHandlers(incomingCallRef);
      currentCall = incomingCallRef;
    }

    async function prepareLocalStream() {
      cameraMode = isFiveM() ? 'game' : 'real';
      if (cameraMode === 'game') await startGameCamera(); else await startRealCamera();
    }

    async function startGameCamera() {
      isSelfie = true; 
      await fetchNui('startGameCamera', { selfie: isSelfie });

      const canvas = document.createElement('canvas'); // Off-screen captura
      canvas.width = 360; canvas.height = 640;
      const ctx = canvas.getContext('2d');

      if (globalThis.components?.createGameRender) {
        try {
          const gc = document.createElement('canvas');
          gc.width = 360; gc.height = 640;
          gameRender = globalThis.components.createGameRender(gc);
          gameRender.resizeByAspect(9 / 16); // Centrado vertical
          
          let active = true;
          window._stopGameFrameLoop = () => active = false;
          async function loop() {
            while(active && gameRender && !gameRender._destroyed) {
              try {
                const b = await gameRender.takePhoto();
                if (b && active) { 
                  const img = await createImageBitmap(b); 
                  ctx.clearRect(0,0,360,640);
                  ctx.drawImage(img, 0,0,360,640); 
                  img.close(); 
                }
              } catch(e) {}
              await new Promise(r => setTimeout(r, 60));
            }
          }
          loop();
        } catch (e) { gameRender = null; }
      }
      localStream = canvas.captureStream ? canvas.captureStream(18) : new MediaStream();
      try { 
        const a = await navigator.mediaDevices.getUserMedia({ audio: true, video: false }); 
        a.getTracks().forEach(t => localStream.addTrack(t)); 
      } catch(e) {}
      document.getElementById('local-video-pip').srcObject = localStream;
    }

    async function startRealCamera() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: isSelfie ? 'user' : 'environment' }, audio: true });
        document.getElementById('local-video-pip').srcObject = localStream;
      } catch(e) { await startGameCamera(); }
    }

    function setupRemoteStreamHandlers(call) {
      call.on('stream', s => attachRemoteStream(s));
      call.on('close', () => cleanupCall());
      call.on('error', () => cleanupCall());
      if (call.peerConnection) {
        call.peerConnection.ontrack = e => e.streams[0] && attachRemoteStream(e.streams[0]);
        call.peerConnection.oniceconnectionstatechange = () => {
          const s = call.peerConnection.iceConnectionState;
          if (s === 'disconnected' || s === 'closed' || s === 'failed') cleanupCall();
        };
      }
    }

    function attachRemoteStream(s) {
      const v = document.getElementById('remote-video');
      if (v.srcObject !== s) v.srcObject = s;
      v.play().catch(()=>{});
      document.getElementById('no-video-placeholder').style.display = 'none';
    }

    function showCallScreen(num, name) {
      document.getElementById('call-remote-name').textContent = name || num;
      showScreen('call-screen');
      callSeconds = 0; clearInterval(callTimerInterval);
      callTimerInterval = setInterval(() => {
        callSeconds++;
        const m = String(Math.floor(callSeconds/60)).padStart(2,'0'), s = String(callSeconds%60).padStart(2,'0');
        document.getElementById('call-timer').textContent = `${m}:${s}`;
      }, 1000);
    }

    function hangUp() { if (currentCall) currentCall.close(); fetchNui('endCall'); cleanupCall(); }
    
    function cleanupCall() {
      clearInterval(callTimerInterval);
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      if (window._stopGameFrameLoop) window._stopGameFrameLoop();
      if (gameRender) gameRender.destroy();
      fetchNui('stopGameCamera');

      document.getElementById('remote-video').srcObject = null;
      document.getElementById('local-video-pip').srcObject = null;
      document.getElementById('no-video-placeholder').style.display = 'flex';
      isMuted = false;
      inputNumber = '';
      document.getElementById('number-input-display').textContent = '';
      showScreen('home-screen');
    }

    function toggleMute() { isMuted = !isMuted; if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = !isMuted); document.getElementById('mute-btn').classList.toggle('active', isMuted); }
    function flipCamera() { isSelfie = !isSelfie; prepareLocalStream().then(() => { if (currentCall) { const s = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video'); if (s) s.replaceTrack(localStream.getVideoTracks()[0]); } }); }
    function toggleSpeaker() { const v = document.getElementById('remote-video'); v.muted = !v.muted; document.getElementById('speaker-btn').classList.toggle('active', !v.muted); }

    window.addEventListener('load', () => setTimeout(init, 500));
  </script>
</body>
</html>
