<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iCall Video</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; background: #1a1a1a; position: absolute; top: 0; left: 0; }
        #local-video { position: absolute; top: 20px; right: 20px; width: 90px; height: 130px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.3); z-index: 10; object-fit: cover; background: #000; }
        .ui-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 30px 20px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); z-index: 20; text-align: center; }
        #my-id { font-size: 10px; color: rgba(255,255,255,0.5); margin-bottom: 10px; word-break: break-all; padding: 0 20px; }
        input { width: 80%; padding: 12px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: #fff; margin-bottom: 15px; text-align: center; backdrop-filter: blur(10px); }
        button { width: 80%; padding: 14px; border-radius: 15px; border: none; background: #34C759; color: white; font-weight: 600; font-size: 16px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .error-msg { position: absolute; top: 50%; width: 100%; text-align: center; font-size: 12px; color: rgba(255,255,255,0.2); pointer-events: none; }
    </style>
</head>
<body>
    <video id="local-video" autoplay muted playsinline></video>
    <video id="remote-video" autoplay playsinline></video>
    
    <div class="error-msg" id="err-log">Conectando servicio de video...</div>

    <div class="ui-overlay">
        <div id="my-id">Cargando ID...</div>
        <input type="text" id="remote-id" placeholder="Pegar ID aquí">
        <button onclick="llamar()">CONECTAR VIDEO</button>
    </div>

    <script>
        const peer = new Peer(); 
        let localStream;

        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
            localStream = stream;
            document.getElementById('local-video').srcObject = stream;
            document.getElementById('err-log').style.display = 'none';
        }).catch(err => {
            document.getElementById('err-log').innerText = "Cámara no detectada (Modo Receptor)";
        });

        peer.on('open', id => { document.getElementById('my-id').innerText = "Tu ID: " + id; });

        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', st => { document.getElementById('remote-video').srcObject = st; });
        });

        function llamar() {
            const rId = document.getElementById('remote-id').value;
            const call = peer.call(rId, localStream);
            call.on('stream', st => { document.getElementById('remote-video').srcObject = st; });
        }
    </script>
</body>
</html>
