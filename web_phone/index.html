<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LB Video Link</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        #local-video { position: absolute; top: 20px; right: 20px; width: 80px; height: 120px; border-radius: 10px; border: 1px solid #444; z-index: 10; object-fit: cover; background: #222; }
        .controls { z-index: 20; position: absolute; bottom: 30px; width: 100%; text-align: center; }
        input { width: 70%; padding: 12px; border-radius: 10px; border: none; background: rgba(255,255,255,0.2); color: #fff; text-align: center; margin-bottom: 10px; }
        .btn-call { background: #34C759; color: white; padding: 15px 40px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; }
        .btn-hangup { background: #FF3B30; color: white; padding: 15px 40px; border-radius: 30px; border: none; font-weight: bold; display: none; }
        #status { font-size: 10px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>
    <video id="local-video" autoplay muted playsinline></video>
    <video id="remote-video" autoplay playsinline></video>

    <div class="controls">
        <input type="text" id="target-number" placeholder="Número a llamar">
        <br>
        <button id="call-btn" class="btn-call" onclick="makeCall()">LLAMAR</button>
        <button id="hang-btn" class="btn-hangup" onclick="endCall()">COLGAR</button>
        <div id="status">Iniciando...</div>
    </div>

    <script>
        let peer, localStream, currentCall;
        const urlParams = new URLSearchParams(window.location.search);
        // El número viene del client.lua (?number=XXXX)
        const myNumber = urlParams.get('number') || "WEB_" + Math.floor(Math.random()*999);

        // Intentar capturar la cámara (En PC fallará, en iPhone servirá)
        navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
            localStream = stream;
            document.getElementById('local-video').srcObject = stream;
        }).catch(() => {
            document.getElementById('status').innerText = "Modo Juego (Solo Cámara GTA)";
        });

        peer = new Peer(myNumber, { host: '0.peerjs.com', port: 443, secure: true });

        peer.on('open', id => { document.getElementById('status').innerText = "Tu Numero: " + id; });

        peer.on('call', call => {
            currentCall = call;
            call.answer(localStream);
            uiCalling(true);
            call.on('stream', s => { document.getElementById('remote-video').srcObject = s; });
        });

        function makeCall() {
            const dest = document.getElementById('target-number').value;
            currentCall = peer.call(dest, localStream);
            uiCalling(true);
            currentCall.on('stream', s => { document.getElementById('remote-video').srcObject = s; });
        }

        function endCall() {
            if(currentCall) currentCall.close();
            location.reload(); // Reinicia para limpiar la cámara
        }

        function uiCalling(isCall) {
            document.getElementById('call-btn').style.display = isCall ? 'none' : 'inline-block';
            document.getElementById('hang-btn').style.display = isCall ? 'inline-block' : 'none';
        }
    </script>
</body>
</html>
