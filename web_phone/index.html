<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iCall - Conexión Directa</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        #local-video { position: absolute; top: 20px; right: 20px; width: 80px; height: 120px; border-radius: 10px; border: 1px solid #444; z-index: 10; object-fit: cover; }
        .ui { position: absolute; bottom: 40px; width: 100%; text-align: center; z-index: 20; }
        .btn { background: #34C759; color: white; border: none; padding: 15px 30px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 80%; }
        .btn.call { background: #007AFF; }
        .info { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 10px; }
        .status-dot { width: 10px; height: 10px; background: #ff3b30; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: #34c759; }
    </style>
</head>
<body>
    <video id="local-video" autoplay muted playsinline></video>
    <video id="remote-video" autoplay playsinline></video>

    <div class="ui">
        <button id="main-btn" class="btn" onclick="iniciarAccion()">CONECTAR AHORA</button>
        <div class="info" id="status-text"><span class="status-dot" id="dot"></span> Esperando...</div>
    </div>

    <script>
        // --- CONFIGURACIÓN DE SALA ---
        // Cambia 'SALA_PRIVADA_YIXA' por algo único para que nadie más se meta
        const ROOM_NAME = 'SALA_PRIVADA_YIXA'; 
        
        // El Juego se identificará como 'juego' y el iPhone como 'iphone'
        const isIPhone = !navigator.userAgent.includes("Electron"); // Detección simple
        const myId = isIPhone ? 'iphone_' + ROOM_NAME : 'juego_' + ROOM_NAME;
        const targetId = isIPhone ? 'juego_' + ROOM_NAME : 'iphone_' + ROOM_NAME;

        const peer = new Peer(myId); 
        let localStream;

        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
            localStream = stream;
            document.getElementById('local-video').srcObject = stream;
        }).catch(() => { console.log("Modo Receptor Activo"); });

        peer.on('open', () => {
            document.getElementById('dot').classList.add('online');
            document.getElementById('status-text').innerText = isIPhone ? "iPhone Listo" : "Juego Listo";
            document.getElementById('main-btn').innerText = isIPhone ? "LLAMAR AL JUEGO" : "ESPERANDO LLAMADA...";
        });

        // Recibir llamada automáticamente
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', st => { 
                document.getElementById('remote-video').srcObject = st;
                document.getElementById('main-btn').style.display = 'none';
            });
        });

        function iniciarAccion() {
            if(isIPhone) {
                const call = peer.call(targetId, localStream);
                call.on('stream', st => { 
                    document.getElementById('remote-video').srcObject = st;
                    document.getElementById('main-btn').style.display = 'none';
                });
            }
        }
    </script>
</body>
</html>
