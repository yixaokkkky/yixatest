<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiveM Video Link</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .video-container { position: relative; width: 90%; max-width: 400px; aspect-ratio: 9/16; background: #000; border-radius: 20px; border: 2px solid #333; overflow: hidden; }
        video#remote-video { width: 100%; height: 100%; object-fit: cover; }
        video#local-video { position: absolute; top: 10px; right: 10px; width: 30%; border-radius: 10px; border: 1px solid #fff; z-index: 10; }
        .controls { margin-top: 15px; width: 90%; max-width: 400px; text-align: center; }
        input { width: 70%; padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px; }
        button { background: #25D366; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #my-id { font-size: 0.8rem; color: #888; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="local-video" autoplay muted playsinline></video>
        <video id="remote-video" autoplay playsinline></video>
    </div>
    
    <div class="controls">
        <p id="my-id">Generando ID...</p>
        <input type="text" id="remote-id" placeholder="ID del otro dispositivo">
        <button onclick="llamar()">LLAMAR</button>
        <p id="status">Esperando conexión...</p>
    </div>

    <script>
        const peer = new Peer(); 
        let localStream;
        const status = document.getElementById('status');

        // Acceder a cámara y micro
        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
            localStream = stream;
            document.getElementById('local-video').srcObject = stream;
        }).catch(err => status.innerText = "Error de cámara: " + err);

        peer.on('open', id => {
            document.getElementById('my-id').innerText = "Tu ID: " + id;
        });

        // Recibir llamada
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', remoteStream => {
                document.getElementById('remote-video').srcObject = remoteStream;
                status.innerText = "Conectado";
            });
        });

        // Iniciar llamada
        function llamar() {
            const rId = document.getElementById('remote-id').value;
            if(!rId) return alert("Pon el ID");
            const call = peer.call(rId, localStream);
            status.innerText = "Llamando...";
            call.on('stream', remoteStream => {
                document.getElementById('remote-video').srcObject = remoteStream;
                status.innerText = "En línea";
            });
        }
    </script>
</body>
</html>
